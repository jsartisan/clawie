version: '3'

# go-task tasks for local development. Install go-task: https://taskfile.dev
# `task dev` starts a tmux session with separate windows for host and web, then attaches.

tasks:
  dev:
    desc: Start and attach to the tmux development environment
    cmds:
      - node scripts/dev.mjs dev

  start:
    desc: Start the development environment (without attaching)
    cmds:
      - node scripts/dev.mjs start

  stop:
    desc: Stop the development environment
    cmds:
      - node scripts/dev.mjs stop

  status:
    desc: Show status of all dev processes
    cmds:
      - node scripts/dev.mjs status

  restart-*:
    desc: "Restart a service (host, web)"
    cmds:
      - node scripts/dev.mjs restart {{index .MATCH 0}}

  tail-*:
    desc: "View recent output from a service (host, web)"
    cmds:
      - node scripts/dev.mjs tail {{index .MATCH 0}}

  install:
    desc: Install host (pnpm) and web (bun) dependencies
    cmds:
      - pnpm install --frozen-lockfile
      - task: install:web

  install:web:
    dir: web
    cmds:
      - bun install --frozen-lockfile

  build:
    desc: Build the host (tsc) and the admin web UI (vite)
    cmds:
      - pnpm run build
      - task: build:web

  build:web:
    dir: web
    cmds:
      - bun run build

  typecheck:
    desc: Typecheck host and web
    cmds:
      - pnpm run typecheck
      - task: typecheck:web

  typecheck:web:
    dir: web
    cmds:
      - bun run typecheck
